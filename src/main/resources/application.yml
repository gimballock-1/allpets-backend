spring:
  application:
    name: allpets-api

  # appdb (owner role app_svc). Creds come from the k8s Secret at runtime — never here.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/appdb}
    username: ${SPRING_DATASOURCE_USERNAME:app_svc}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:5}   # single-replica clinic volume
      pool-name: appdb-pool

  jpa:
    hibernate:
      ddl-auto: validate          # schema is owned by Flyway, never Hibernate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC

  flyway:
    enabled: true                 # versioned SQL under classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  # Behind Traefik: trust forwarded headers so client IP / scheme are correct (14.x).
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        # Health + Prometheus scrape + build/version info. Nothing else exposed.
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true          # /actuator/health/liveness + /actuator/health/readiness
      show-details: never      # no internals leaked on the public health endpoint
      group:
        readiness:
          # Readiness flips UP only when appdb is reachable (LLD §4) — the rollout gate.
          include: readinessState,db
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true            # surface the info.* block below
  metrics:
    tags:
      application: ${spring.application.name}

# Build traceability — populated at deploy time (CD passes GIT_SHA / BUILD_TIME).
info:
  app:
    name: ${spring.application.name}
  git:
    sha: ${GIT_SHA:dev}
  build:
    time: ${BUILD_TIME:unknown}

logging:
  level:
    root: INFO
    com.allpets.api: INFO

# allpets application config.
allpets:
  cors:
    # Origin allowlist for the public API host (20.4). The Next.js site's server-side
    # /api proxy origin; credentials are off. CORS is enforced in Spring (CorsConfig),
    # not at the ingress. Comma-separate for multiple origins.
    allowed-origins: ${ALLPETS_CORS_ALLOWED_ORIGINS:https://allpets.skpodduturi.dev}
  reviews:
    # Google Reviews cache (Epic 10). place-id is NON-secret (GOOGLE_PLACE_ID, 10.1);
    # api-key is a SECRET (GOOGLE_PLACES_API_KEY, 10.2). Both empty until provided -> the
    # scheduled refresh is a no-op and GET /reviews serves a typed-empty payload.
    place-id: ${GOOGLE_PLACE_ID:}
    api-key: ${GOOGLE_PLACES_API_KEY:}
    # Daily refresh (Place Details bills per call; ~30/month stays in the free tier).
    refresh-cron: ${REVIEWS_REFRESH_CRON:0 0 3 * * *}
    timezone: ${REVIEWS_TIMEZONE:America/Chicago}

---
# `migrate` profile — deploy-time migration gate (issue 15.9). The CD pipeline runs the
# app image as a one-shot Job with SPRING_PROFILES_ACTIVE=migrate BEFORE rolling the
# Deployment: Flyway migrates, JPA validate checks the schema, then MigrateRunner exits.
# No web server is needed for that, so disable it (faster start, no port bind). Flyway
# stays enabled here (it is the migrator); the running Deployment sets
# SPRING_FLYWAY_ENABLED=false so the Job is the single migration authority.
spring:
  config:
    activate:
      on-profile: migrate
  main:
    web-application-type: none
