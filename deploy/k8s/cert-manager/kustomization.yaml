# allpets cert-manager — the dedicated Cloudflare DNS-01 ClusterIssuer (issue 20.4).
#
# cloudflare-api-token.example.yaml is intentionally NOT included: the real token is a
# Secret applied out-of-band into the cert-manager namespace (same pattern as the
# database/*.example.yaml secrets). Applying the issuer is harmless before the token
# exists — it simply won't issue a Ready cert until the token + DNS records are in place.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - letsencrypt-cloudflare.yaml
