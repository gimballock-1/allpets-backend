# allpets dedicated cert-manager ClusterIssuer — Cloudflare DNS-01 (issue 20.4)
#
# Cluster-scoped issuer referenced by every allpets host Ingress via the annotation
#   cert-manager.io/cluster-issuer: letsencrypt-cloudflare
# DEDICATED to allpets: the shared cluster-wide `letsencrypt-prod` issuer (Route53,
# zone kinvee.in) ALSO fronts the aarogya healthcare-prod tenant + `ai.kinvee.in` and
# is LEFT UNTOUCHED. See deploy/k8s/ingress/README.md and planning/deployment.md §2.4.
#
# Solver: ACME production, DNS-01 via Cloudflare for the `skpodduturi.dev` zone. The
# API token lives in the `cloudflare-api-token` Secret (see cloudflare-api-token.example.yaml)
# — least privilege Zone.DNS:Edit + Zone.Zone:Read on skpodduturi.dev. Because this is a
# ClusterIssuer, cert-manager reads that Secret from its OWN namespace
# (--cluster-resource-namespace, default `cert-manager`), not the workload namespace.
# DNS-01 needs no port-80 reachability and no ACME HTTP path.
#
# LIVE STEP — applying this does NOT finish 20.4's cert: the real `cloudflare-api-token`
# Secret must exist in the cert-manager namespace AND the skpodduturi.dev A-records must
# be created (the zone is net-new) before any <host>-tls cert reaches Ready.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-cloudflare
  labels:
    app.kubernetes.io/part-of: allpets
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: skrx7392@gmail.com
    privateKeySecretRef:
      name: letsencrypt-cloudflare-account-key   # cert-manager stores the ACME account key here
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - skpodduturi.dev
