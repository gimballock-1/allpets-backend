# allpets Spring backend — api workload (issue 20.5).
#
# Deployment + Service + the api.allpets.skpodduturi.dev Ingress (authored in 20.4).
# Folded into the root kustomization once the Service exists (this PR).
#
# The runtime Secret (allpets-api-secret.example.yaml) is intentionally NOT included
# — the real Secret is created out-of-band (see that template), matching the
# database/*.example.yaml precedent. The `redirect-https` Middleware the Ingress
# references is wired into the root kustomization (deploy/k8s/ingress/redirect-https.yaml);
# Traefik resolves the reference at request time, so apply order doesn't matter.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NOTE: the app runs with Flyway disabled (SPRING_FLYWAY_ENABLED=false) — migrations are
# applied by the pre-deploy migrate Job (migrate-job.yaml, issue 15.9), which CD runs and
# waits on BEFORE this apply. A manual `kubectl apply -k` here skips that gate and would
# roll the app (validate-only) against a possibly-unmigrated schema — run migrate-job.yaml
# first. The Job is intentionally NOT a resource here: Jobs are immutable, so CD deletes +
# re-applies it each deploy rather than `apply -k`-ing it.
resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
