# allpets Spring backend runtime Secret — TEMPLATE ONLY (issue 20.5)
#
# !!! TEMPLATE — DO NOT APPLY DIRECTLY, DO NOT COMMIT REAL SECRETS !!!
# Every value is a PLACEHOLDER (REPLACE_ME). The real Secret is created out-of-band
# on the cluster, keeping the Secret NAME `allpets-api-secret` and the KEYS below
# stable so the Deployment keeps consuming them. 14.6 owns automated materialization.
#
# Intentionally NOT wired into deploy/k8s/api/kustomization.yaml (it carries secrets).
#
# CONSUMER: deployment.yaml (env via secretKeyRef). Phase 1 consumes only
# SPRING_DATASOURCE_PASSWORD; the mail/Google keys are pre-shaped here so Epic 13 /
# Epic 10 just add their secretKeyRef env to the Deployment — no Secret reshape.
#
# SPRING_DATASOURCE_PASSWORD MUST equal the app_svc role password, i.e. the same
# value as `APP_SVC_PASSWORD` in the allpets-database `postgres-secret` (a workload
# cannot read a Secret across namespaces, so the app keeps its own copy here).
#
# Create the real Secret (no file left in the work tree):
#   kubectl -n allpets-backend create secret generic allpets-api-secret \
#     --from-literal=SPRING_DATASOURCE_PASSWORD='<app_svc password>'
#   # (add --from-literal for the mail/Google keys when Epic 13 / 10 wire them)
# Or write to /tmp and shred:
#   cp this template to /tmp/allpets-api-secret.yaml; fill in; then
#   kubectl -n allpets-backend apply -f /tmp/allpets-api-secret.yaml && shred -u /tmp/allpets-api-secret.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: allpets-api-secret
  namespace: allpets-backend
  labels:
    app.kubernetes.io/name: allpets-api
    app.kubernetes.io/part-of: allpets
    allpets.skpodduturi.dev/tier: backend
type: Opaque
stringData:
  # --- appdb (consumed now, 20.5) ---
  SPRING_DATASOURCE_PASSWORD: REPLACE_ME   # == postgres-secret APP_SVC_PASSWORD
  # --- mail (Epic 13) — wired when 13.x lands ---
  SPRING_MAIL_HOST: REPLACE_ME
  SPRING_MAIL_PORT: "587"
  SPRING_MAIL_USERNAME: REPLACE_ME
  SPRING_MAIL_PASSWORD: REPLACE_ME
  # --- Google Places reviews (Epic 10) — wired when 10.x lands ---
  GOOGLE_PLACES_API_KEY: REPLACE_ME
