# allpets MinIO Secrets — TEMPLATE ONLY (issues 4.6 / 4.7)
#
# ░░ DO NOT COMMIT REAL CREDENTIALS ░░
# This is an *.example.yaml template with placeholder values. The 14.6 secrets
# pipeline (GitHub repo secrets -> k8s Secret) does not exist yet, so the
# orchestrator creates the REAL Secrets out-of-band on the cluster with strong
# generated values, e.g.:
#
#   kubectl -n allpets-database create secret generic minio-root-secret \
#     --from-literal=MINIO_ROOT_USER="$(openssl rand -hex 12)" \
#     --from-literal=MINIO_ROOT_PASSWORD="$(openssl rand -base64 36)"
#   kubectl -n allpets-database create secret generic minio-payload-key \
#     --from-literal=MINIO_PAYLOAD_ACCESS_KEY="$(openssl rand -hex 12)" \
#     --from-literal=MINIO_PAYLOAD_SECRET_KEY="$(openssl rand -base64 36)"
#
# The Secret NAMES and KEYS below are the stable contract the StatefulSet (4.6),
# the setup Job (4.7), and Payload (5.10) consume — keep them identical when
# materializing. 14.6 will own ongoing materialization/rotation.
#
# Secrets in this repo carry the standard allpets labels so kustomize prune and
# `kubectl get -l app.kubernetes.io/part-of=allpets` see them.
#
# NOTE for kustomize: this *.example.yaml must NOT be listed in
# kustomization.yaml resources — applying it would push REPLACE_ME values. The
# real Secrets are created out-of-band (see commands above).

# --- MinIO root credentials (server superuser) -----------------------------
# Consumed by minio-statefulset.yaml via envFrom; used by the setup Job to mint
# the SCOPED payload user (the root key is NEVER handed to Payload).
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-root-secret
  namespace: allpets-database
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: allpets
    allpets.kinvee.in/tier: database
type: Opaque
stringData:
  MINIO_ROOT_USER: REPLACE_ME
  MINIO_ROOT_PASSWORD: REPLACE_ME

# --- MinIO scoped key for Payload (4.7) ------------------------------------
# A least-privilege user limited to the allpets-media bucket (R/W objects +
# ListBucket on that bucket only — see minio-setup-job.yaml). Payload (5.10)
# uses THIS key, never the root key.
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-payload-key
  namespace: allpets-database
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: payload-key
    app.kubernetes.io/part-of: allpets
    allpets.kinvee.in/tier: database
type: Opaque
stringData:
  MINIO_PAYLOAD_ACCESS_KEY: REPLACE_ME
  MINIO_PAYLOAD_SECRET_KEY: REPLACE_ME
