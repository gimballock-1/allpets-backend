# allpets Postgres bootstrap + app-role Secret — TEMPLATE ONLY (issues 4.2 / 4.3)
#
# !!! TEMPLATE — DO NOT APPLY DIRECTLY, DO NOT COMMIT REAL SECRETS !!!
# Every value below is a PLACEHOLDER (REPLACE_ME). The 14.6 secrets pipeline
# (GitHub repo secrets -> k8s Secret) does NOT exist yet, so this repo carries
# only the SHAPE. The orchestrator creates the REAL Secret out-of-band on the
# cluster with generated strong values (e.g. `openssl rand -base64 24`), keeping
# the Secret NAME `postgres-secret` and the KEYS below stable so the apps and the
# init Job keep consuming them. 14.6 will own automated materialization later.
#
# This file is intentionally NOT wired into deploy/k8s/kustomization.yaml.
#
# CONSUMERS (keys must stay stable):
#   - Postgres Deployment (postgres-deployment.yaml): envFrom this whole Secret
#       POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB  -> superuser + bootstrap db
#       APP_SVC_PASSWORD / CALCOM_APP_PASSWORD           -> read by the initdb .sh
#   - Init Job (postgres-init-job.yaml): same env, applies roles/DBs to a running
#     cluster (initdb only fires on first boot).
#   - pg_dump CronJob (4.5, separate deliverable): connects with an app role.
#
# To create the real Secret:
#   cp postgres-secret.example.yaml /tmp/postgres-secret.yaml
#   # replace each REPLACE_ME with a generated strong value
#   kubectl -n allpets-database apply -f /tmp/postgres-secret.yaml && shred -u /tmp/postgres-secret.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: allpets-database
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: allpets
    allpets.kinvee.in/tier: database
type: Opaque
stringData:
  # --- bootstrap superuser + default db (postgres:16 entrypoint reads these) ---
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: REPLACE_ME
  POSTGRES_DB: postgres
  # --- per-app login-role passwords (4.3); read from env by the init script/Job ---
  # NEVER hardcoded in SQL — the scripts reference $APP_SVC_PASSWORD / $CALCOM_APP_PASSWORD.
  # APP_SVC_PASSWORD is the renamed former PAYLOAD_APP_PASSWORD (pivot: appdb/app_svc).
  APP_SVC_PASSWORD: REPLACE_ME
  CALCOM_APP_PASSWORD: REPLACE_ME
