# allpets-backend CI — build + test on pull requests (issue #134 / 15.4).
# Provides the stable "ci" status check that the "Protect main" ruleset requires
# before merge. Uses only GitHub-owned, SHA-pinned actions (kept in lockstep with
# cd.yml and within the repo's restricted Actions allowlist).
name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Build and test
        run: ./gradlew --no-daemon build

  # Single, stable required-status-check context for branch protection. Stays
  # "ci" even as the jobs above evolve (matrix, lint, integration, …), so the
  # ruleset never needs editing when the pipeline changes.
  ci:
    if: always()
    needs: [build-and-test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require all CI jobs to pass
        run: |
          if [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "::error::build-and-test result was '${{ needs.build-and-test.result }}'"
            exit 1
          fi
          echo "All required CI jobs passed."
