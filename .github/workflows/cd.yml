# allpets-backend CI/CD — build, test, push image to GHCR, deploy to quasar (k3s).
#
# Mirrors the AarogyaBackend strategy (same shared quasar node, Tailscale 100.108.60.90):
# GitHub Actions builds + pushes the image to GHCR with the built-in GITHUB_TOKEN, then
# connects Tailscale and deploys over SSH. Hardened beyond the aarogya baseline (project
# policy is to not inherit aarogya's regressions): SHA-pinned actions, host-key pinning,
# persist-credentials off, a main-only deploy guard, and deploy preflight checks.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   TAILSCALE_OAUTH_CLIENT_ID, TAILSCALE_OAUTH_SECRET  — Tailscale OAuth client (tag:ci)
#   DEV_SERVER_SSH_KEY                                 — private key for sk@quasar
#   (GITHUB_TOKEN is automatic and pushes to ghcr.io/gimballock-1/*)
#
# Cluster prerequisites (one-time, out-of-band):
#   - allpets-api-secret (SPRING_DATASOURCE_PASSWORD) in ns allpets-backend
#   - ghcr-pull imagePullSecret in ns allpets-backend  (OR make the GHCR package public)
#   - the letsencrypt-cloudflare ClusterIssuer + the api.allpets.skpodduturi.dev DNS record
#
# Further hardening (Epic 15): a dedicated namespace-scoped RBAC deploy ServiceAccount/
# kubeconfig instead of sk's cluster-admin config; splitting build-push into its own job so
# packages:write is scoped to that job only.
name: CD

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - 'gradlew'
      - 'deploy/Dockerfile.api'
      - 'deploy/k8s/api/**'
      - 'deploy/k8s/ingress/redirect-https.yaml'
      - 'deploy/ci/known_hosts'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

concurrency:
  group: cd-deploy
  cancel-in-progress: true

jobs:
  deploy:
    # Deploy ONLY reviewed main — a manual workflow_dispatch on any other ref is skipped
    # (so an unreviewed branch can never be pushed to the production cluster).
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false   # don't leave GITHUB_TOKEN in .git/config for build steps

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Test (gates the deploy)
        run: ./gradlew --no-daemon test

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: deploy/Dockerfile.api
          push: true
          # :main is the floating ref the committed Deployment placeholder uses (so the first
          # `apply -k` pulls a real image); :<sha> is the immutable tag the deploy pins to.
          tags: |
            ghcr.io/gimballock-1/allpets-api:main
            ghcr.io/gimballock-1/allpets-api:${{ github.sha }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to quasar (k3s) over Tailscale
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEV_SERVER_SSH_KEY }}
          IMAGE: ghcr.io/gimballock-1/allpets-api:${{ github.sha }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cp deploy/ci/known_hosts ~/.ssh/known_hosts   # pin quasar's host key (no TOFU)
          HOST=sk@100.108.60.90
          SSHO="-o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          # Ship ONLY the manifests this workflow applies (api workload + the shared
          # middleware) — never the *.example.yaml Secret template.
          ssh $SSHO "$HOST" 'mkdir -p ~/allpets-deploy/api ~/allpets-deploy/ingress'
          scp $SSHO deploy/k8s/api/kustomization.yaml deploy/k8s/api/deployment.yaml \
                    deploy/k8s/api/service.yaml deploy/k8s/api/ingress.yaml "$HOST":~/allpets-deploy/api/
          scp $SSHO deploy/k8s/ingress/redirect-https.yaml "$HOST":~/allpets-deploy/ingress/
          ssh $SSHO "$HOST" "IMAGE='$IMAGE' GIT_SHA='$GIT_SHA' BUILD_TIME='$BUILD_TIME' bash -s" <<'REMOTE'
          set -euo pipefail
          export KUBECONFIG=/home/sk/.kube/config
          # Preflight: fail fast with a clear message instead of a 180s rollout timeout.
          kubectl -n allpets-backend get secret allpets-api-secret >/dev/null 2>&1 \
            || { echo "ERROR: allpets-api-secret missing in allpets-backend — create it first"; exit 1; }
          kubectl -n allpets-backend get secret ghcr-pull >/dev/null 2>&1 \
            || echo "WARNING: ghcr-pull not found — deploy will ImagePullBackOff unless the GHCR package is public"
          # NOT a whole-tree apply: the live cert-manager issuer + DB substrate must not be
          # clobbered/rolled. Apply only the shared redirect-https Middleware + the api/ dir.
          kubectl apply -f ~/allpets-deploy/ingress/redirect-https.yaml
          kubectl apply -k ~/allpets-deploy/api
          # Atomic rollout with automatic rollback (15.10). Capture the last-good
          # revision BEFORE changing anything: `set env` + `set image` create two
          # intermediate revisions, so a plain `rollout undo` would only revert the
          # last one — undo --to-revision targets the exact pre-deploy revision.
          NS=allpets-backend
          DEP=deployment/allpets-api
          REV_PATH='{.metadata.annotations.deployment\.kubernetes\.io/revision}'
          PREV_REV="$(kubectl -n "$NS" get "$DEP" -o jsonpath="$REV_PATH" 2>/dev/null || true)"
          kubectl -n "$NS" set env "$DEP" GIT_SHA="$GIT_SHA" BUILD_TIME="$BUILD_TIME"
          kubectl -n "$NS" set image "$DEP" allpets-api="$IMAGE"
          if kubectl -n "$NS" rollout status "$DEP" --timeout=180s; then
            echo "Rollout healthy (revision $(kubectl -n "$NS" get "$DEP" -o jsonpath="$REV_PATH"), image $IMAGE)."
          else
            echo "::error::allpets-api rollout failed to become healthy — rolling back to revision ${PREV_REV:-previous}"
            if [ -n "$PREV_REV" ]; then
              kubectl -n "$NS" rollout undo "$DEP" --to-revision="$PREV_REV"
            else
              kubectl -n "$NS" rollout undo "$DEP"
            fi
            kubectl -n "$NS" rollout status "$DEP" --timeout=120s \
              || echo "::warning::rollback did not confirm healthy within 120s — manual intervention needed"
            exit 1
          fi
          REMOTE
