# allpets-backend CI/CD — build, test, push image to GHCR, deploy to quasar (k3s).
#
# Mirrors the AarogyaBackend strategy (same shared quasar node, Tailscale 100.108.60.90):
# GitHub Actions builds + pushes the image to GHCR with the built-in GITHUB_TOKEN, then
# connects Tailscale and deploys over SSH. Adapted for allpets: Gradle/Java build, the
# api/ kustomize dir, and OUT-OF-BAND secrets (no in-manifest secret injection — the real
# allpets-api-secret / ghcr-pull live on the cluster).
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   TAILSCALE_OAUTH_CLIENT_ID, TAILSCALE_OAUTH_SECRET  — Tailscale OAuth client (tag:ci)
#   DEV_SERVER_SSH_KEY                                 — private key for sk@quasar
#   (GITHUB_TOKEN is automatic and pushes to ghcr.io/gimballock-1/*)
#
# Cluster prerequisites (one-time, out-of-band):
#   - allpets-api-secret (SPRING_DATASOURCE_PASSWORD) in ns allpets-backend
#   - ghcr-pull imagePullSecret in ns allpets-backend  (OR make the GHCR package public)
#   - the letsencrypt-cloudflare ClusterIssuer + the api.allpets.skpodduturi.dev DNS record
name: CD

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradlew'
      - 'deploy/Dockerfile.api'
      - 'deploy/k8s/api/**'
      - 'deploy/k8s/ingress/redirect-https.yaml'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

concurrency:
  group: cd-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Test (gates the deploy)
        run: ./gradlew --no-daemon test

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: true
          tags: |
            ghcr.io/gimballock-1/allpets-api:latest
            ghcr.io/gimballock-1/allpets-api:${{ github.sha }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade # v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to quasar (k3s) over Tailscale
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEV_SERVER_SSH_KEY }}
          IMAGE: ghcr.io/gimballock-1/allpets-api:${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          HOST=sk@100.108.60.90
          SSHO="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          # Ship only the manifests this workflow applies (api workload + the shared middleware).
          ssh $SSHO "$HOST" 'mkdir -p ~/allpets-deploy/api ~/allpets-deploy/ingress'
          scp $SSHO deploy/k8s/api/*.yaml "$HOST":~/allpets-deploy/api/
          scp $SSHO deploy/k8s/ingress/redirect-https.yaml "$HOST":~/allpets-deploy/ingress/
          ssh $SSHO "$HOST" "IMAGE='$IMAGE' bash -s" <<'REMOTE'
          set -euo pipefail
          export KUBECONFIG=/home/sk/.kube/config
          # NOT a whole-tree apply: the live cert-manager issuer + DB substrate must not be
          # clobbered/rolled. Apply only the shared redirect-https Middleware + the api/ dir
          # (Deployment/Service/Ingress; the example Secret is excluded by api/kustomization.yaml).
          kubectl apply -f ~/allpets-deploy/ingress/redirect-https.yaml
          kubectl apply -k ~/allpets-deploy/api
          kubectl -n allpets-backend set image deployment/allpets-api allpets-api="$IMAGE"
          kubectl -n allpets-backend rollout status deployment/allpets-api --timeout=180s
          REMOTE
